#################################
#           Animations          #
#################################

animations = ({
    triggers = ["open", "show"];
    preset = "appear";
    duration = 0.25;
    scale = 0.9;
},{
    triggers = ["close", "hide"];
    preset = "disappear";
    duration = 0.25;
    scale = 0.9;
},{
    triggers = ["geometry"];
    preset = "geometry-change";
    duration = 0.35;
});

fading = true
fade-in-step = 0.05;
fade-out-step = 0.05;


#################################
#     Background-Blurring       #
#################################

blur: {
 method = "dual_kawase";
 strength = 4;
 background = true;
 background-frame = true;
 background-fixed = true;
}

blur-background-exclude = [
    "class_g != 'Dunst'"
];

# opacity = 100%;

# to make vs code and discord a bit transparent and blurred
opacity-rule = [
#   "88:class_g = 'Dunst'",
#     "90:class_g = 'Code'",
#     "90:class_g = 'kitty'",
#     "90:class_g = 'goland'",
#     "80:class_g = 'tidal-hifi'",
#     "88:class_g = 'discord'",
]


#################################
#           Corners             #
#################################

corner-radius = 0


#################################
#       General Settings        #
#################################

backend = "glx";
glx-no-stencil = true;

use-damage = true;

vsync = true;

detect-rounded-corners = true;

detect-transient = true;

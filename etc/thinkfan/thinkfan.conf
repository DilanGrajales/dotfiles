# ================================
# SENSORES
# ================================

sensors:
  # Sensor principal del ThinkPad (CPU / GPU / VRM / hotspot)
  - hwmon: /sys/class/hwmon
    name: thinkpad
    indices: [1, 2, 3, 5]
    # 1 = CPU, 2 = GPU, 3 = temp3 (VRM zona), 5 = temp5 (hotspot)

  # Package del CPU (por si marca un pelín diferente)
  - hwmon: /sys/class/hwmon
    name: coretemp
    indices: [1]

  # Storage units per slot
  # - hwmon: /sys/devices/pci0000:00/0000:00:1b.0/0000:06:00.0/nvme/nvme1/hwmon4/temp1_input
  # - hwmon: /sys/devices/pci0000:00/0000:00:06.0/0000:04:00.0/nvme/nvme0/hwmon3/temp1_input

# ================================
# CURVA DE VENTILADOR
# ================================
# ThinkPad fan levels:
#   0   = apagado
#   1   = muy bajo
#   2-3 = bajo
#   4-5 = medio
#   6-7 = alto
#   127 = máximo

fans:
  # Ventilador de ThinkPad vía thinkpad_acpi
  - tpacpi: /proc/acpi/ibm/fan

levels:
  - [2,   0,  47]   # <=47°C: ventilador casi apagado, totalmente silencioso
  - [3,  45,  52]   # 48-52°C: giro muy suave, casi inaudible
  - [4,  50,  57]   # 53-57°C: empieza a soplar un poco más para anticiparse
  - [5,  55,  62]   # 58-62°C: rango principal, intenta mantenerla en ~58-60°C
  - [6,  60,  70]   # 63-70°C: mayor velocidad sin ser la maxima
  - ["level disengaged", 68,  85]  # >68°C: full por seguridad, no debería tocarlo muy seguido

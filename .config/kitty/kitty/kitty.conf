# vim:fileencoding=utf-8:ft=conf

# ────── Fuente ──────
font_family        SF Mono Regular
italic_font        auto
bold_font          auto
bold_italic_font   auto
font_size          16.0
window_padding_width 5

# ────── Colores One Dark ──────
foreground         #abb2bf
background         #282c34
selection_foreground #282c34
selection_background #abb2bf
cursor             #528bff

# 16 terminal colors (One Dark)
color0   #282c34
color8   #5c6370

color1   #e06c75
color9   #e06c75

color2   #98c379
color10  #98c379

color3   #e5c07b
color11  #e5c07b

color4   #61afef
color12  #61afef

color5   #c678dd
color13  #c678dd

color6   #56b6c2
color14  #56b6c2

color7   #dcdfe4
color15  #ffffff

# ────── Cursor ──────
cursor_shape       beam
shell_integration  no-cursor
cursor_blink_interval     0.6
cursor_stop_blinking_after 15.0

# ────── Scrollback ──────
scrollback_lines 2000
scrollback_pager less +G -R
wheel_scroll_multiplier 5.0

# ────── Selección y palabras ──────
click_interval 0.5
select_by_word_characters :@-./_~?&=%+#

# ────── Mouse ──────
mouse_hide_wait 0.0

# ────── Ventana y Layouts ──────
enabled_layouts *
remember_window_size   no
initial_window_width   640
initial_window_height  400
repaint_delay          10
sync_to_monitor        yes
input_delay            3

# ────── Campanas ──────
visual_bell_duration 0.0
enable_audio_bell no

# ────── URLs ──────
# open_url_modifiers ctrl+shift
open_url_with default

# ────── Título y Borde ──────
term xterm-kitty
window_border_width 1
window_margin_width 0
active_border_color   #61afef
inactive_border_color #1e222a

# ────── Tabs (Powerline) ──────
tab_bar_style powerline
tab_powerline_style round
active_tab_foreground   #282c34
active_tab_background   #c678dd
inactive_tab_foreground #282c34
inactive_tab_background #61afef

# ────── Navegación entre ventanas ──────
map ctrl+shift+left  neighboring_window left
map ctrl+shift+right neighboring_window right
map ctrl+shift+up    neighboring_window up
map ctrl+shift+down  neighboring_window down

# ────── Portapapeles ──────
map super+v           paste_from_clipboard
map ctrl+shift+s      paste_from_selection
map super+c           copy_to_clipboard
map shift+insert      paste_from_selection

# ────── Scroll ──────
map ctrl+shift+k         scroll_line_up
map ctrl+shift+j         scroll_line_down
map ctrl+shift+page_up   scroll_page_up
map ctrl+shift+page_down scroll_page_down
map ctrl+shift+home      scroll_home
map ctrl+shift+end       scroll_end
map ctrl+shift+h         show_scrollback

# ────── Gestión de ventanas ──────
map super+n             new_os_window
map super+w             close_window
map ctrl+shift+enter    new_window_with_cwd
map ctrl+shift+]        next_window
map ctrl+shift+[        previous_window
map ctrl+shift+f        move_window_forward
map ctrl+shift+b        move_window_backward
map ctrl+shift+`        move_window_to_top
map ctrl+shift+1        first_window
map ctrl+shift+2        second_window
map ctrl+shift+3        third_window
map ctrl+shift+4        fourth_window
map ctrl+shift+5        fifth_window
map ctrl+shift+6        sixth_window
map ctrl+shift+7        seventh_window
map ctrl+shift+8        eighth_window
map ctrl+shift+9        ninth_window
map ctrl+shift+0        tenth_window

# ────── Tabs ──────
map ctrl+alt+right    next_tab
map ctrl+alt+left     previous_tab
map ctrl+shift+t      new_tab_with_cwd
map ctrl+shift+q      close_tab
map ctrl+shift+l      next_layout
map ctrl+shift+.      move_tab_forward
map ctrl+shift+,      move_tab_backward

# ────── Tamaño de fuente ──────
map ctrl+=        increase_font_size
map ctrl+-        decrease_font_size
map ctrl+0        restore_font_size

# ────── Buscar en scrollback ──────
map ctrl+shift+w launch --location=hsplit --allow-remote-control kitty +kitten search.py @active-kitty-window-id

# ────── Decoraciones de ventana ──────
hide_window_decorations titlebar-only
macos_option_as_alt no
macos_titlebar_color background

# ────── Control remoto ──────
allow_remote_control yes

# ────── Shell predeterminado ──────
shell zsh

# ------------------------------------------------------------------------------
# /etc/tlp.conf - TLP user configuration (version 1.9.0 merged)
# ------------------------------------------------------------------------------

# --- Parámetros Generales ---
TLP_ENABLE=1
TLP_WARN_LEVEL=3

# --- CPU y Rendimiento ---
# Optimizamos para que en AC (conectado) el i7-11850H tenga el maximo performance
CPU_DRIVER_OPMODE_ON_AC=active
CPU_DRIVER_OPMODE_ON_BAT=active

CPU_SCALING_GOVERNOR_ON_AC=powersave
CPU_SCALING_GOVERNOR_ON_BAT=powersave

CPU_ENERGY_PERF_POLICY_ON_AC=power
CPU_ENERGY_PERF_POLICY_ON_BAT=power
CPU_ENERGY_PERF_POLICY_ON_SAV=power

# Límites de P-State para controlar térmicos en el Thinkpad P1
CPU_MIN_PERF_ON_AC=0
CPU_MAX_PERF_ON_AC=60
CPU_MIN_PERF_ON_BAT=0
CPU_MAX_PERF_ON_BAT=60

CPU_BOOST_ON_AC=1
CPU_BOOST_ON_BAT=0

# Perfiles de plataforma Lenovo (ajusta ventiladores y TDP)
PLATFORM_PROFILE_ON_AC=low-power
PLATFORM_PROFILE_ON_BAT=low-power

# --- Wake on LAN ---
# N = No deshabilitar (o sea, habilitarlo)
WOL_DISABLE=N

# --- Red y Conectividad ---
WIFI_PWR_ON_AC=off
WIFI_PWR_ON_BAT=off

# --- Gestión de USB (Crítico para tu Monitor/Dock) ---
# Evitamos que el chip Realtek Ethernet del monitor se duerma
USB_AUTOSUSPEND=1
USB_DENYLIST="0bda:8153"
USB_EXCLUDE_BTUSB=1

# --- Gestión de Batería (Tus umbrales de salud) ---
# Mantenemos tu 70/80 para alargar la vida útil del P1
START_CHARGE_THRESH_BAT0=70
STOP_CHARGE_THRESH_BAT0=80

# --- Radio Device Wizard (RDW) ---
# Configuración para que el WiFi se apague al conectar LAN y viceversa
DEVICES_TO_DISABLE_ON_LAN_CONNECT="wifi"
DEVICES_TO_ENABLE_ON_LAN_DISCONNECT="wifi"

# --- Otros ---
RUNTIME_PM_ON_AC=auto
RUNTIME_PM_ON_BAT=auto
# Hibernación configurada según tus preferencias
RESERVE_CHARGE_MODE=hibernate
